<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- Film grain overlay for intro/cinematic scene -->
  <!-- baseFrequency=0.9, no numOctaves (browser default=1) -->
  <filter id="n">
    <feTurbulence baseFrequency="0.9" stitchTiles="stitch"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#n)" opacity="1"/>
</svg>
