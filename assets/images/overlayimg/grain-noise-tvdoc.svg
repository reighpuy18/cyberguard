<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- Film grain overlay for TV documentary scene -->
  <!-- fractalNoise, baseFrequency=0.8, numOctaves=4 — coarser grain -->
  <filter id="g">
    <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
  </filter>
  <rect width="200" height="200" filter="url(#g)" opacity="0.06"/>
</svg>
