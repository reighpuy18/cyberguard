<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- Film grain overlay for TV news scene -->
  <!-- fractalNoise, baseFrequency=0.9, numOctaves=3 — fine broadcast grain -->
  <filter id="g">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
  </filter>
  <rect width="200" height="200" filter="url(#g)" opacity="0.04"/>
</svg>
