# Apache reverse proxy snippet for CyberQuest webhook
#
# Add this inside your <VirtualHost> block (or in a separate .conf file
# that gets included), then:  sudo a2enmod proxy proxy_http && sudo systemctl reload apache2

# Security headers
Header always set X-Frame-Options "DENY"
Header always set X-Content-Type-Options "nosniff"
Header always set Referrer-Policy "no-referrer"
Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
# frame-ancestors must be delivered as an HTTP header (browsers ignore it in <meta> CSP)
Header always set Content-Security-Policy "frame-ancestors 'none'"

# Proxy /webhook → local Python listener on port 9000
ProxyPass        /webhook  http://127.0.0.1:9000/  retry=2 timeout=30
ProxyPassReverse /webhook  http://127.0.0.1:9000/
